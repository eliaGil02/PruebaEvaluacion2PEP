{% extends "base.html" %}

{% block contenido %}

<div class="form-container"> <!-- Contenedor principal del formulario -->
    <h2>Crear nueva tarea</h2>

    <form method="post"> <!-- Formulario para enviar datos -->
        {% csrf_token %} <!-- Token de seguridad obligatorio en POST -->

        {{ form.as_p }} <!-- Renderiza automáticamente los campos del formulario -->

        <div class="acciones-form"> <!-- Contenedor de botones -->
            <button type="submit" class="btn btn-guardar">
                Guardar <!-- Envía el formulario -->
            </button>

            <a href="{% url 'lista_tareas' %}" class="btn btn-cancelar">
                Cancelar <!-- Vuelve a la lista sin guardar -->
            </a>
        </div>
    </form>
</div>

{% endblock %}
