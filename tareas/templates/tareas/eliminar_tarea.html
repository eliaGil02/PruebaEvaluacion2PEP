{% extends "base.html" %}

{% block title %}Eliminar tarea{% endblock %}

{% block contenido %}

<h2>Eliminar tarea</h2>

<p>¿Seguro que quieres eliminar esta tarea?</p>

<p><strong>{{ object.titulo }}</strong></p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Eliminar</button>
</form>

<br>

<a href="{% url 'detalle_tarea' tarea.pk %}">
    Cancelar
</a>

{% endblock %}
